services:
  postgres:
    image: postgres:16
    container_name: prime-banking-postgres
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - prime_banking_postgres_data:/var/lib/postgresql/data

volumes:
  prime_banking_postgres_data:
